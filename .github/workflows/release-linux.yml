name: Release Linux AppImage

# Builds the VibeSkua Linux AppImage (Avalonia app + embedded ruffle_core) and
# attaches it to a GitHub Release. Triggered by pushing a v*-linux tag, or
# manually. Kept separate from the Windows release workflow (release.yml).
on:
  push:
    tags: ['v*-linux']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, no leading v)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust (nightly — for embedded ruffle_core)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools
          dotnet tool install -g vpk

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            REF="${GITHUB_REF_NAME#v}"
            echo "version=${REF%-linux}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build AppImage
        run: ./packaging/build-appimage.sh "${{ steps.ver.outputs.version }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeSkuaLinux-AppImage
          path: packaging/Releases/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VibeSkua Linux ${{ steps.ver.outputs.version }}
          tag_name: v${{ steps.ver.outputs.version }}-linux
          target_commitish: ${{ github.sha }}
          make_latest: true
          files: |
            packaging/Releases/VibeSkuaLinux.AppImage
            packaging/Releases/*.nupkg
            packaging/Releases/RELEASES-linux
            packaging/Releases/releases.linux.json
          body: |
            Native-Linux build of VibeSkua — Avalonia UI + embedded ruffle_core.

            **Run:**
            ```bash
            chmod +x VibeSkuaLinux.AppImage
            ./VibeSkuaLinux.AppImage
            ```
            Self-contained (bundles the .NET runtime + `libskua_flash.so` with
            Ruffle embedded). No .NET or Flash install required.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
