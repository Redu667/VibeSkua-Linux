name: Release Linux AppImage

# Builds the VibeSkua Linux AppImage (Avalonia app + embedded ruffle_core) and
# attaches it to a GitHub Release. Triggered by pushing a v*-linux tag, or
# manually. Kept separate from the Windows release workflow (release.yml).
on:
  push:
    tags: ['v*-linux']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, no leading v)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Rust (nightly — for embedded ruffle_core)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools
          dotnet tool install -g vpk

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            REF="${GITHUB_REF_NAME#v}"
            echo "version=${REF%-linux}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build AppImage
        run: ./packaging/build-appimage.sh "${{ steps.ver.outputs.version }}"

      - name: Prepare release notes
        id: notes
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          awk -v ver="v$VERSION" '
            $0 == "## " ver { found = 1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No '## v$VERSION' section found in CHANGELOG.md" >&2
            exit 1
          fi
          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: VibeSkuaLinux-AppImage
          path: packaging/Releases/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VibeSkua Linux ${{ steps.ver.outputs.version }}
          tag_name: v${{ steps.ver.outputs.version }}-linux
          target_commitish: ${{ github.sha }}
          make_latest: true
          files: |
            packaging/Releases/VibeSkuaLinux.AppImage
            packaging/Releases/*.nupkg
            packaging/Releases/RELEASES-linux
            packaging/Releases/releases.linux.json
          body_path: ${{ steps.notes.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
